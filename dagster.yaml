run_coordinator:
  module: dagster._core.run_coordinator
  class: DefaultRunCoordinator

run_launcher:
  module: dagster._core.launcher
  class: DefaultRunLauncher

# CONFIGURACIÓN CRÍTICA PARA CAPA GRATUITA:
# Evita abrir subprocesos paralelos pesados y corre todo de forma síncrona
executor:
  module: dagster._core.executor
  class: in_process_executor